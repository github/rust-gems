<svg xmlns="http://www.w3.org/2000/svg" width="900" height="300" viewBox="0 0 900 300" role="img" aria-labelledby="title desc">
  <title id="title">Skipping deleted slots</title>
  <desc id="desc">A lookup skips deleted slots in the ranking until it finds a live slot.</desc>
  <style>
    .label { font: 16px sans-serif; fill: #24292f; }
    .small { font: 13px sans-serif; fill: #57606a; }
    .live { fill: #dafbe1; stroke: #2da44e; stroke-width: 2; rx: 10; }
    .deleted { fill: #ffebe9; stroke: #cf222e; stroke-width: 2; rx: 10; }
    .arrow { stroke: #57606a; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#57606a" />
    </marker>
  </defs>
  <text x="450" y="42" text-anchor="middle" class="label">Lookup with deleted = {5, 8}</text>
  <g transform="translate(105,90)">
    <rect width="100" height="70" class="deleted"/>
    <text x="50" y="30" text-anchor="middle" class="label">node 5</text>
    <text x="50" y="52" text-anchor="middle" class="small">deleted</text>
  </g>
  <path d="M210 125 H250" class="arrow"/>
  <g transform="translate(260,90)">
    <rect width="100" height="70" class="live"/>
    <text x="50" y="30" text-anchor="middle" class="label">node 1</text>
    <text x="50" y="52" text-anchor="middle" class="small">return</text>
  </g>
  <g transform="translate(415,90)">
    <rect width="100" height="70" class="deleted"/>
    <text x="50" y="30" text-anchor="middle" class="label">node 8</text>
    <text x="50" y="52" text-anchor="middle" class="small">deleted</text>
  </g>
  <g transform="translate(570,90)">
    <rect width="100" height="70" class="live"/>
    <text x="50" y="30" text-anchor="middle" class="label">node 3</text>
    <text x="50" y="52" text-anchor="middle" class="small">live</text>
  </g>
  <text x="710" y="133" class="label">...</text>
  <text x="450" y="220" text-anchor="middle" class="small">No removal history is needed. The current deleted set is enough.</text>
</svg>
